<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Molecular Geometry</title>
  <style>
    :root {
      --cyan:   rgb(100, 130, 210);
      --purple: rgb(80, 105, 185);
      --bg:     #07070f;
      --card:   rgba(255,255,255,0.03);
      --border: rgba(255,255,255,0.08);
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: #fff; }
    body { font-family: 'JetBrains Mono', 'Courier New', monospace; }

    /* dotted grid — same as Ollie DottedSurface */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(rgba(255,255,255,0.055) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    #app { position: relative; width: 100%; height: 100%; }

    #canvas-wrap { position: absolute; inset: 0; z-index: 1; }
    #canvas-wrap canvas { display: block; width: 100% !important; height: 100% !important; }

    /* ── header ── */
    #header {
      position: absolute; top: 0; left: 0; right: 0; z-index: 10;
      padding: 20px 28px;
      display: flex; align-items: center; gap: 20px;
      background: linear-gradient(to bottom, rgba(7,7,15,0.9) 0%, transparent 100%);
    }
    #title {
      color: var(--cyan); font-size: 10px; letter-spacing: 4px;
      text-transform: uppercase; font-weight: 700; white-space: nowrap;
    }
    #search-row { display: flex; gap: 8px; flex: 1; max-width: 400px; }

    #molecule-input {
      flex: 1; background: rgba(255,255,255,0.04);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 14px; color: #fff;
      font-family: 'JetBrains Mono', monospace; font-size: 13px;
      outline: none; transition: border-color 0.2s;
    }
    #molecule-input::placeholder { color: rgba(255,255,255,0.2); }
    #molecule-input:focus { border-color: rgba(100,130,210,0.5); }

    #build-btn {
      background: rgba(100,130,210,0.1);
      border: 1px solid rgba(100,130,210,0.3); border-radius: 8px;
      color: var(--cyan); padding: 8px 18px;
      font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700;
      cursor: pointer; transition: all 0.2s; letter-spacing: 1px; white-space: nowrap;
    }
    #build-btn:hover { background: rgba(100,130,210,0.2); border-color: rgba(100,130,210,0.5); }

    /* ── error toast ── */
    #error {
      position: absolute; top: 72px; left: 50%; transform: translateX(-50%);
      z-index: 20; padding: 8px 20px; border-radius: 8px;
      background: rgba(255,60,60,0.1); border: 1px solid rgba(255,60,60,0.3);
      color: rgba(255,120,120,0.9); font-size: 11px; letter-spacing: 0.5px;
      opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
    }
    #error.show { opacity: 1; }

    /* ── loading ── */
    #loading {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      z-index: 20; text-align: center; color: rgba(255,255,255,0.25);
      font-size: 10px; letter-spacing: 4px;
    }

    /* ── info panel ── */
    #info { position: absolute; bottom: 24px; left: 28px; z-index: 10; }

    .panel {
      background: rgba(7,7,15,0.78); backdrop-filter: blur(18px);
      border: 1px solid var(--border); border-radius: 14px; padding: 14px 20px;
    }
    .info-row { display: flex; gap: 28px; }
    .info-item { display: flex; flex-direction: column; gap: 3px; }
    .lbl { color: rgba(255,255,255,0.22); font-size: 8.5px; letter-spacing: 2.5px; text-transform: uppercase; }
    .val { color: #fff; font-size: 14px; font-weight: 700; min-width: 70px; }
    .val.accent { color: var(--cyan); }

    /* ── legend ── */
    #legend { position: absolute; top: 72px; right: 28px; z-index: 10; }
    .leg-title { color: rgba(255,255,255,0.22); font-size: 8.5px; letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 10px; }
    .leg-row { display: flex; align-items: center; gap: 9px; margin-bottom: 6px; font-size: 11px; color: rgba(255,255,255,0.45); }
    .leg-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }

    /* ── example chips ── */
    #examples {
      position: absolute; bottom: 24px; right: 28px; z-index: 10;
      display: flex; flex-wrap: wrap; gap: 6px; max-width: 300px; justify-content: flex-end;
    }
    .chip {
      background: var(--card); border: 1px solid var(--border); border-radius: 20px;
      padding: 4px 13px; font-size: 11px; color: rgba(255,255,255,0.35);
      cursor: pointer; transition: all 0.2s; font-family: 'JetBrains Mono', monospace;
    }
    .chip:hover { border-color: rgba(100,130,210,0.4); color: var(--cyan); }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">

  <script type="importmap">
  {
    "imports": {
      "three":         "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/webgpu":  "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.webgpu.js",
      "three/tsl":     "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.tsl.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
<div id="app">

  <div id="header">
    <span id="title">Molecular Geometry</span>
    <div id="search-row">
      <input id="molecule-input" type="text" placeholder="H2O  ·  CH4  ·  NH3  ·  CO2..." autocomplete="off" spellcheck="false">
      <button id="build-btn">BUILD →</button>
    </div>
  </div>

  <div id="error"></div>
  <div id="loading">INITIALISING WEBGPU</div>

  <div id="canvas-wrap"></div>

  <div id="info">
    <div class="panel">
      <div class="info-row">
        <div class="info-item"><span class="lbl">Molecule</span><span class="val accent" id="v-mol">—</span></div>
        <div class="info-item"><span class="lbl">Geometry</span><span class="val" id="v-geo">—</span></div>
        <div class="info-item"><span class="lbl">Bond Angle</span><span class="val" id="v-ang">—</span></div>
        <div class="info-item"><span class="lbl">Bonds</span><span class="val" id="v-bnd">—</span></div>
        <div class="info-item"><span class="lbl">Lone Pairs</span><span class="val" id="v-lp">—</span></div>
      </div>
    </div>
  </div>

  <div id="legend">
    <div class="panel" id="leg-panel" style="min-width:130px"></div>
  </div>

  <div id="examples"></div>
</div>

<script type="module">
import * as THREE from 'three/webgpu';
import { color, float, normalWorld, positionWorld, cameraPosition, Fn } from 'three/tsl';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── VSEPR tables ─────────────────────────────────────────────────────────────

const VALENCE = {
  H:1, He:2, Li:1, Be:2, B:3, C:4, N:5, O:6, F:7, Ne:8,
  Na:1, Mg:2, Al:3, Si:4, P:5, S:6, Cl:7, Ar:8,
  K:1, Ca:2, Br:7, I:7, Xe:8, Se:6, As:5, Ge:4, Sn:4
}
const OCTET = {
  H:2, He:2, Li:8, Be:8, B:6, C:8, N:8, O:8, F:8, Ne:8,
  Na:8, Mg:8, Al:8, Si:8, P:8, S:8, Cl:8, Ar:8,
  K:8, Ca:8, Br:8, I:8, Xe:8, Se:8, As:8, Ge:8, Sn:8
}

// CPK colours tuned for dark/glowing aesthetic
const ATOM_HEX = {
  H:0xc8c8dc, C:0x585868, N:0x3050ff, O:0xff2828,
  F:0x38cc38, Cl:0x18c018, Br:0xa02020, I:0x780088,
  S:0xd4c018, P:0xff6808, Na:0xaa18ff, K:0x7818ff,
  Ca:0x787800, Si:0x8090a0, default:0x8088aa
}
const ATOM_R = {
  H:0.22, C:0.34, N:0.30, O:0.28, F:0.26, Cl:0.40,
  Br:0.44, I:0.50, S:0.36, P:0.36, Si:0.38, default:0.32
}
const BOND_L = 1.52

const ALIASES = {
  water:'H2O', methane:'CH4', ammonia:'NH3',
  'carbon dioxide':'CO2', 'hydrogen fluoride':'HF',
  'boron trifluoride':'BF3', 'hydrogen sulfide':'H2S',
  'phosphorus trichloride':'PCl3', 'carbon tetrachloride':'CCl4',
  'sulfur dioxide':'SO2', 'nitrogen trifluoride':'NF3',
}

const GEO_NAMES = {
  '1,0':['Linear (diatomic)','—'],
  '2,0':['Linear','180°'],
  '3,0':['Trigonal Planar','120°'],
  '3,1':['Bent','~115°'],
  '4,0':['Tetrahedral','109.5°'],
  '4,1':['Trigonal Pyramidal','107°'],
  '4,2':['Bent','104.5°'],
}

// ── VSEPR logic ───────────────────────────────────────────────────────────────

function parseFormula(raw) {
  const formula = ALIASES[raw.trim().toLowerCase()] ?? raw.trim()
  const re = /([A-Z][a-z]?)(\d*)/g
  const atoms = []
  let m
  while ((m = re.exec(formula)) !== null) {
    if (!m[1]) continue
    const el = m[1], n = parseInt(m[2]||'1')
    if (!(el in VALENCE)) throw new Error(`Unknown element: ${el}`)
    atoms.push({ el, n })
  }
  if (!atoms.length) throw new Error('Cannot parse formula')
  return { atoms, formula }
}

function vsepr(raw) {
  const { atoms, formula } = parseFormula(raw)

  let wants = 0, got = 0, totalAtoms = 0
  let central = null

  for (const { el, n } of atoms) {
    wants      += (OCTET[el]   ?? 8) * n
    got        += (VALENCE[el] ?? 4) * n
    totalAtoms += n
    if (n === 1) central = el   // last single-count = central atom
  }
  if (!central) central = atoms[0].el

  const ligandCount = totalAtoms - 1
  const bonds       = (wants - got) / 2
  const midwant     = OCTET[central] ?? 8
  let   lp          = Math.max(0, (midwant - bonds * 2) / 2)
  if (ligandCount === 1) lp = 0   // diatomic: no lone pair display

  // Build ligand array
  const ligands = []
  for (const { el, n } of atoms) {
    const skip = (el === central) ? 1 : 0
    for (let i = skip; i < n; i++) ligands.push(el)
  }

  return { formula, central, ligands, bonds, lp, ligandCount }
}

// ── 3D positions ──────────────────────────────────────────────────────────────

const D = Math.PI / 180

function ligandPos(lc, lp) {
  const d = lc + lp   // total electron domains
  const L = BOND_L

  if (lc === 1) return [new THREE.Vector3(L,0,0)]

  if (d === 2)
    return [new THREE.Vector3(L,0,0), new THREE.Vector3(-L,0,0)]

  if (d === 3) {
    if (lp === 0)
      return [0,120,240].map(a => new THREE.Vector3(L*Math.cos(a*D), 0, L*Math.sin(a*D)))
    const h = 57.5*D
    return [new THREE.Vector3(L*Math.sin(h),-L*Math.cos(h),0),
            new THREE.Vector3(-L*Math.sin(h),-L*Math.cos(h),0)]
  }

  if (d === 4) {
    if (lp === 0) {
      const s = L/Math.sqrt(3)
      return [new THREE.Vector3(s,s,s), new THREE.Vector3(s,-s,-s),
              new THREE.Vector3(-s,s,-s), new THREE.Vector3(-s,-s,s)]
    }
    if (lp === 1) {
      const th = 68.1*D, rh = L*Math.sin(th), ry = -L*Math.cos(th)
      return [0,120,240].map(a => new THREE.Vector3(rh*Math.cos(a*D), ry, rh*Math.sin(a*D)))
    }
    const h = 52.25*D
    return [new THREE.Vector3(L*Math.sin(h),-L*Math.cos(h),0),
            new THREE.Vector3(-L*Math.sin(h),-L*Math.cos(h),0)]
  }

  // fallback: ring
  return Array.from({length:lc}, (_,i) => {
    const a = (360/lc*i)*D
    return new THREE.Vector3(L*Math.cos(a), 0, L*Math.sin(a))
  })
}

function lpPos(lc, lp) {
  const d = lc + lp, L = BOND_L * 1.28
  if (d === 3 && lp === 1) return [new THREE.Vector3(0,L,0)]
  if (d === 4 && lp === 1) return [new THREE.Vector3(0,L,0)]
  if (d === 4 && lp === 2) {
    const s = L/Math.sqrt(3)
    return [new THREE.Vector3(-s,s,s), new THREE.Vector3(s,s,-s)]
  }
  return []
}

// ── Three.js / WebGPU ─────────────────────────────────────────────────────────

const wrap = document.getElementById('canvas-wrap')

const scene  = new THREE.Scene()
scene.background = new THREE.Color(0x07070f)

const camera = new THREE.PerspectiveCamera(45, wrap.clientWidth/wrap.clientHeight, 0.1, 100)
camera.position.set(0, 1.5, 8)

const renderer = new THREE.WebGPURenderer({ antialias: true })
renderer.setPixelRatio(window.devicePixelRatio)
renderer.setSize(wrap.clientWidth, wrap.clientHeight)
wrap.appendChild(renderer.domElement)
await renderer.init()
document.getElementById('loading').style.display = 'none'

const controls = new OrbitControls(camera, renderer.domElement)
controls.enableDamping    = true
controls.dampingFactor    = 0.07
controls.autoRotate       = true
controls.autoRotateSpeed  = 0.65
controls.minDistance      = 2
controls.maxDistance      = 22

// Lighting
scene.add(new THREE.AmbientLight(0x4858a0, 0.65))
const kl = new THREE.PointLight(0x6482d2, 110, 50)
kl.position.set(6,6,6); scene.add(kl)
const fl = new THREE.PointLight(0xffffff, 45, 50)
fl.position.set(-6,-3,-6); scene.add(fl)

// ── TSL Fresnel rim glow ──────────────────────────────────────────────────────

const fresnel = Fn(() => {
  const v = cameraPosition.sub(positionWorld).normalize()
  return float(1.0).sub(normalWorld.dot(v).saturate()).pow(float(3.0))
})

function atomMat(hex) {
  const mat = new THREE.MeshPhysicalNodeMaterial()
  mat.colorNode              = color(new THREE.Color(hex))
  mat.roughnessNode          = float(0.10)
  mat.metalnessNode          = float(0.0)
  mat.clearcoatNode          = float(1.0)
  mat.clearcoatRoughnessNode = float(0.04)
  // Ollie-cyan rim glow via TSL fresnel
  mat.emissiveNode = color(0x6482d2).mul(fresnel()).mul(float(0.75))
  return mat
}

function bondMat() {
  const mat = new THREE.MeshStandardNodeMaterial()
  mat.colorNode     = color(0x242c5c)
  mat.roughnessNode = float(0.45)
  mat.metalnessNode = float(0.28)
  mat.emissiveNode  = color(0x3040a0).mul(float(0.18))
  return mat
}

function lpMat() {
  const mat = new THREE.MeshStandardNodeMaterial()
  mat.colorNode     = color(0x6482d2)
  mat.roughnessNode = float(1.0)
  mat.metalnessNode = float(0.0)
  mat.emissiveNode  = color(0x6482d2).mul(float(0.4))
  mat.transparent   = true
  mat.opacityNode   = float(0.2)
  return mat
}

// ── Scene ─────────────────────────────────────────────────────────────────────

let molGroup = new THREE.Group()
scene.add(molGroup)

function clearMol() {
  molGroup.traverse(o => {
    if (o.geometry) o.geometry.dispose()
    if (o.material) o.material.dispose()
  })
  molGroup.clear()
}

function addAtom(pos, el) {
  const r = ATOM_R[el] ?? ATOM_R.default
  const h = ATOM_HEX[el] ?? ATOM_HEX.default
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(r,28,28), atomMat(h))
  mesh.position.copy(pos)
  molGroup.add(mesh)
}

function addBond(a, b) {
  const dir = new THREE.Vector3().subVectors(b, a)
  const len = dir.length()
  const mid = new THREE.Vector3().addVectors(a, b).multiplyScalar(0.5)
  const mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.07,len,12), bondMat())
  mesh.position.copy(mid)
  if (len > 0.001)
    mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.normalize())
  molGroup.add(mesh)
}

function addLP(pos) {
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.22,14,14), lpMat())
  mesh.position.copy(pos)
  molGroup.add(mesh)
}

function buildMol(raw) {
  clearMol()
  const { formula, central, ligands, bonds, lp, ligandCount } = vsepr(raw)
  const atomPositions = ligandPos(ligandCount, lp)
  const lpPositions   = lpPos(ligandCount, lp)
  const [geoName, angle] = GEO_NAMES[`${ligandCount+lp},${lp}`] ?? ['Unknown','—']

  const origin = new THREE.Vector3()
  addAtom(origin, central)
  atomPositions.forEach((p,i) => { addAtom(p, ligands[i]??'H'); addBond(origin, p) })
  lpPositions.forEach(p => addLP(p))

  // info panel
  document.getElementById('v-mol').textContent = formula
  document.getElementById('v-geo').textContent = geoName
  document.getElementById('v-ang').textContent = angle
  document.getElementById('v-bnd').textContent = bonds
  document.getElementById('v-lp').textContent  = lp

  // legend
  const unique = [central, ...new Set(ligands)]
  const panel  = document.getElementById('leg-panel')
  panel.innerHTML =
    `<div class="leg-title">ATOMS</div>` +
    unique.map(el => {
      const hex = '#' + (ATOM_HEX[el]??ATOM_HEX.default).toString(16).padStart(6,'0')
      return `<div class="leg-row"><div class="leg-dot" style="background:${hex}"></div><span>${el}</span></div>`
    }).join('') +
    (lp > 0
      ? `<div class="leg-row"><div class="leg-dot" style="background:rgba(100,130,210,0.25);border:1px solid rgba(100,130,210,0.5)"></div><span style="color:rgba(255,255,255,0.25)">lone pair</span></div>`
      : '')

  controls.autoRotate = true
}

// ── Input handling ────────────────────────────────────────────────────────────

const inputEl = document.getElementById('molecule-input')
const errEl   = document.getElementById('error')
let errTimer

function showErr(msg) {
  errEl.textContent = msg
  errEl.classList.add('show')
  clearTimeout(errTimer)
  errTimer = setTimeout(() => errEl.classList.remove('show'), 3500)
}

function tryBuild(f) {
  if (!f.trim()) return
  try { buildMol(f) } catch(e) { showErr(e.message ?? 'Cannot parse molecule') }
}

document.getElementById('build-btn').addEventListener('click', () => tryBuild(inputEl.value))
inputEl.addEventListener('keydown', e => { if (e.key==='Enter') tryBuild(inputEl.value) })
controls.addEventListener('start', () => controls.autoRotate = false)

const EXAMPLES = ['H2O','CH4','NH3','CO2','BF3','HF','H2S','PCl3','CCl4','SO2','NF3']
const exWrap = document.getElementById('examples')
EXAMPLES.forEach(ex => {
  const b = document.createElement('button')
  b.className = 'chip'
  b.textContent = ex
  b.addEventListener('click', () => { inputEl.value = ex; tryBuild(ex) })
  exWrap.appendChild(b)
})

// ── Render loop ───────────────────────────────────────────────────────────────

renderer.setAnimationLoop(() => { controls.update(); renderer.render(scene, camera) })

window.addEventListener('resize', () => {
  camera.aspect = wrap.clientWidth / wrap.clientHeight
  camera.updateProjectionMatrix()
  renderer.setSize(wrap.clientWidth, wrap.clientHeight)
})

tryBuild('H2O')
</script>
</body>
</html>
